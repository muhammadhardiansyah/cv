        body {
            font-family: "Inter", sans-serif;
            background-color: #f8fafc;
            margin: 0;
            color: #0f172a;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: "Poppins", sans-serif;
        }

        /* Latar Belakang Pola Grid Khas SaaS */
        .bg-grid-pattern {
            background-size: 32px 32px;
            background-image:
                linear-gradient(to right, rgba(0, 0, 0, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
        }

        /* Scrollbar Professional - High Density */
        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Animasi */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-slideUp {
            animation: slideUp 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes pulse-soft {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        .animate-pulse-soft {
            animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        /* Print Formatting Presisi (Memastikan PDF Tidak Kosong) */
        @media print {
            .print-hidden {
                display: none !important;
            }

            body {
                background: white;
                margin: 0;
                padding: 0;
                overflow: visible !important;
            }

            body * {
                visibility: hidden;
            }

            .print-container,
            .print-container * {
                visibility: visible;
            }

            .print-container {
                display: block !important;
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                max-width: 100%;
                box-shadow: none !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            @page {
                size: A4;
                margin: 10mm 15mm;
            }
        }
    </style>
</head>

        const SYSTEM_PROMPT = `Anda adalah elite career coach dan CV strategist dari Azandhi Academy.
Gunakan Bahasa Indonesia yang profesional, formal, dan berorientasi bisnis.

ATURAN KERAS (WAJIB DIPATUHI):
1. TANPA BASA-BASI: DILARANG KERAS menuliskan kalimat pembuka atau penutup (seperti "Tentu, berikut adalah...", "Berikut hasilnya...", dll). Langsung berikan hasil akhirnya saja.
2. SUPER RINGKAS: Setiap poin MAKSIMAL HANYA 5 sampai 7 kata. Potong semua kata yang tidak penting. Buat sangat padat.
3. FORMAT SIMBOL: Awali setiap baris HANYA dengan karakter peluru bulat "• ". JANGAN pernah menggunakan karakter asterisk (*), strip (-), atau angka.
4. KONTEN: JANGAN mengarang metrik. Gunakan action verbs kuat di awal kalimat.`;

        const callGemini = async (
            prompt,
            system = SYSTEM_PROMPT,
            jsonMode = false,
        ) => {
            if (!GEMINI_API_KEYS || GEMINI_API_KEYS.length === 0) {
                return jsonMode
                    ? { error: true, message: "API Key belum diatur." }
                    : "⚠️ [Mode Demo] API Key belum diatur.";
            }

            const body = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: system }] },
                generationConfig: jsonMode
                    ? { responseMimeType: "application/json", temperature: 0.3 }
                    : { temperature: 0.7 },
            };

            for (let attempt = 0; attempt < 5; attempt++) {
                try {
                    const randomKey =
                        GEMINI_API_KEYS[
                        Math.floor(Math.random() * GEMINI_API_KEYS.length)
                        ];
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${randomKey}`;

                    const res = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(body),
                    });

                    if (!res.ok) {
                        if (res.status === 429) throw new Error("RATE_LIMIT");
                        throw new Error(`HTTP Error ${res.status}`);
                    }

                    const data = await res.json();
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";

                    if (jsonMode)
                        return JSON.parse(
                            (text || "")
                                .replace(/```json\n?/g, "")
                                .replace(/```\n?/g, "")
                                .trim(),
                        );
                    return text;
                } catch (e) {
                    if (attempt === 4) {
                        if (e.message === "RATE_LIMIT")
                            return jsonMode
                                ? {
                                    error: true,
                                    message: "Semua jalur server AI sedang penuh.",
                                }
                                : "⚠️ Seluruh jaringan AI sedang sibuk. Mohon tunggu beberapa saat.";
                        return jsonMode
                            ? { error: true, message: e.message }
                            : `Error AI: ${e.message}`;
                    }
                    await new Promise((r) => setTimeout(r, 500));
                }
            }
        };

        }) => {

            useEffect(() => {
                if (value !== localValue) setLocalValue(value || "");
            }, [value]);

            const handleChange = (e) => {
                setLocalValue(e.target.value);
                onChange(e.target.value);
            };

            return (

            const [user, setUser] = useState(null);

            const [emailInput, setEmailInput] = useState("");
            const [aiLoading, setAiLoading] = useState(false);
            const [exportingWord, setExportingWord] = useState(false);

                {
                    id: "personal",

                    desc: "Cetak Dokumen",

            // ─── FETCH EXTERNAL API (HEADLESS CMS CONNECTION) ───
            const loadDataFromSheets = async (email) => {
                if (GAS_API_URL.includes("YOUR_SCRIPT_ID")) {
                    console.warn(
                        "URL Backend belum di-set. Menjalankan Mode Offline (UI Only).",
                    );
                    return;
                }
                try {
                    const res = await fetch(GAS_API_URL, {
                        method: "POST",
                        headers: { "Content-Type": "text/plain;charset=utf-8" }, // DITAMBAHKAN UNTUK CORS
                        body: JSON.stringify({ action: "loadCVs", email: email }),
                    });
                    const responseData = await res.json();
                    if (responseData.success) {
                        const validData = (responseData.data || []).filter(
                            (d) => d && d.id,
                        );
                        setCvs(validData.sort((a, b) => b.lastModified - a.lastModified));
                    }
                } catch (e) {
                    console.error("Gagal terhubung ke Database Google Sheets", e);
                }
            };

            const handleLogin = () => {
                if (!emailInput.includes("@")) {
                    alert("Mohon masukkan alamat email yang valid.");
                    return;
                }
                setUser({ email: emailInput });
                loadDataFromSheets(emailInput);
                setView("dashboard");
            };

            const handleLogout = () => {
                setUser(null);
                setCvs([]);
                setActiveCv(null);
                setView("landing");
            };
            const handleCreateNew = () => {
                setActiveCv(createEmptyCV());
                setView("builder");
                setStep(0);
            };
            const handleOpenCV = (cv) => {
                setActiveCv({ ...cv });
                setView("builder");
                setStep(0);
            };

            const handleSave = async () => {
                if (!user || !activeCv) return;
                setSaving(true);
                const toSave = { ...activeCv, lastModified: Date.now() };

                if (GAS_API_URL.includes("YOUR_SCRIPT_ID")) {
                    // Mode Offline / Simulasi Canvas
                    setCvs((prev) => {
                        const ex = prev.find((c) => c.id === activeCv.id);
                        return ex
                            ? prev.map((c) => (c.id === activeCv.id ? toSave : c))
                            : [toSave, ...prev];
                    });
                    setTimeout(() => setSaving(false), 800);
                    return;
                }

                try {
                    const res = await fetch(GAS_API_URL, {
                        method: "POST",
                        headers: { "Content-Type": "text/plain;charset=utf-8" }, // DITAMBAHKAN UNTUK CORS
                        body: JSON.stringify({
                            action: "saveCV",
                            cvData: JSON.stringify(toSave),
                            email: user.email,
                        }),
                    });
                    const data = await res.json();
                    if (data && data.success) {
                        setCvs((prev) => {
                            const ex = prev.find((c) => c.id === activeCv.id);
                            return ex
                                ? prev.map((c) => (c.id === activeCv.id ? toSave : c))
                                : [toSave, ...prev];
                        });
                        alert("✅ Berhasil disimpan ke Cloud!");
                    } else {
                        alert(
                            "Gagal menyimpan ke server cloud: " +
                            (data?.error || "Unknown error"),
                        );
                    }
                } catch (e) {
                    alert("Gagal koneksi ke server Cloud Database: " + e.message);
                }
                setSaving(false);
            };

            const handleDeleteCV = async (e, id) => {
                e.stopPropagation();
                if (
                    !confirm(
                        "Apakah Anda yakin ingin menghapus CV ini secara permanen?",
                    )
                )
                    return;

                if (!GAS_API_URL.includes("YOUR_SCRIPT_ID")) {
                    try {
                        await fetch(GAS_API_URL, {
                            method: "POST",
                            headers: { "Content-Type": "text/plain;charset=utf-8" }, // DITAMBAHKAN UNTUK CORS

                    } catch (e) {
                        console.error("Error deleting from cloud:", e);
                    }
                }
                setCvs((prev) => prev.filter((c) => c.id !== id));
            };

            const upd = (section, field, val) =>
                setActiveCv((prev) =>
                    section
                        ? { ...prev, [section]: { ...prev[section], [field]: val } }
                        : { ...prev, [field]: val },
                );

                    ...prev,
                    [section]: prev[section].map((item) =>
                        item.id === id ? { ...item, [field]: val } : item,
                    ),
                }));
            const addArr = (section, def) =>
                setActiveCv((prev) => ({
                    ...prev,
                    [section]: [...prev[section], def],

            const delArr = (section, id) =>
                setActiveCv((prev) => ({
                    ...prev,
                    [section]: prev[section].filter((item) => item.id !== id),

                setExportingWord(true);
                try {
                    if (!window.docx) {
                        alert(
                            "Sistem pembuat Word belum termuat. Pastikan koneksi internet stabil lalu Refresh halaman.",
                        );
                        setExportingWord(false);
                        return;
                    }

                    const {
                        Document,
                        Packer,
                        Paragraph,
                        TextRun,
                        AlignmentType,
                        BorderStyle,
                    } = window.docx;
                    const cv = activeCv;

                    if (!cv || !cv.personal) {
                        alert(
                            "Data CV tidak lengkap. Mohon isi informasi pribadi terlebih dahulu.",
                        );
                        setExportingWord(false);
                        return;

                        if (!dt) return "";
                        try {
                            const d = new Date(dt);
                            return d.toLocaleDateString("id-ID", {
                                month: "long",
                                year: "numeric",
                            });
                        } catch (e) {
                            return "";

                    };

                    const FONT = "Arial";
                    const children = [];

                    // 1. NAMA LENGKAP
                    children.push(
                        new Paragraph({
